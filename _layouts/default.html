<!doctype html>
<html lang="{{ site.lang | default: 'ru' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/site-chrome.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/docs.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="{{ '/agent-roadmap.html' | relative_url }}">Coding Agent</a>
      <nav class="site-nav" aria-label="Навигация">
        <a href="{{ '/agent-roadmap.html' | relative_url }}">Roadmap</a>
        <a href="{{ '/steps/' | relative_url }}">Steps</a>
        <a href="{{ '/docs/agent-edge-cases.html' | relative_url }}">Edge cases</a>
        <a href="{{ '/' | relative_url }}">О проекте</a>
      </nav>
    </div>
  </header>

  <main class="docs-main">
    <article class="docs-content markdown-body">
      {{ content }}
    </article>
  </main>

  <footer class="site-footer">
    <div class="site-footer__inner">
      <a href="{{ '/agent-roadmap.html' | relative_url }}">← Вернуться к roadmap</a>
    </div>
  </footer>
</body>
</html>
